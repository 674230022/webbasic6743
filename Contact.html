<!DOCTYPE html>
<html>

<head>
    <title>สวนสัตว์ Pooriphat Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0 auto;
            font-size: 16px;
            line-height: 2;
        }

        .container {
            padding: 0 100px;
            text-align: center;
            padding-bottom: 50px;
            background-image: url("Bg/pexels-eberhardgross-1366913.jpg");
            background-size: cover;
            background-position: center;
        }

        h1 {
            color: white;
            text-align: center;
        }

        .navbar {

            padding: 15px;
            text-align: center;

        }


        .navbar a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 20px;
            display: inline-block;
            transition: 0.2s;
            padding: 20px auto;
        }


        .navbar a:hover {
            color: rgb(187, 255, 0);
            font-weight: bold;
            transform: translateY(-13px);
        }

        .card {
            background-color: #d5e9d5;
            border-radius: 12px 10px;
            padding: 15px 35px;
            margin: 35px 35px;
        }

        .introduce {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .introduce img {
            width: 500px;
            border-radius: 10px;
            object-fit: cover;
        }

        .slider {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
        }

        .slider img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .slider div {
            min-width: 300px;
            text-align: center;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 16px;
        }

        .ticket-box {
            background: white;
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

        }

        .ticket-btn {
            display: inline-block;
            background: orange;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .ticket-btn:hover {
            background: darkorange;
            transform: translateY(-3px);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: white;
            background: #333;
            padding: 8px 20px;
            border-radius: 20px;
        }

        .buy-btn {
            background: green;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: darkgreen;
            transform: translateY(-3px);
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #333;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: black;
        }
    </style>

</head>

<body>

</body>

</html>
