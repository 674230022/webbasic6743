<!DOCTYPE html>
<html>

<head>
    <title>สวนสัตว์ Pooriphat Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0 auto;
            font-size: 16px;
            line-height: 2;
        }

        .container {
            padding: 0 100px;
            text-align: center;
            padding-bottom: 50px;
            background-image: url("Bg/pexels-eberhardgross-1366913.jpg");
            background-size: cover;
            background-position: center;
        }

        h1 {
            color: white;
            text-align: center;
        }

        .navbar {

            padding: 15px;
            text-align: center;

        }


        .navbar a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 20px;
            display: inline-block;
            transition: 0.2s;
            padding: 20px auto;
        }


        .navbar a:hover {
            color: rgb(187, 255, 0);
            font-weight: bold;
            transform: translateY(-13px);
        }

        .card {
            background-color: #d5e9d5;
            border-radius: 12px 10px;
            padding: 15px 35px;
            margin: 35px 35px;
            
        }

        .introduce {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .introduce img {
            width: 500px;
            border-radius: 10px;
            object-fit: cover;
        }

        .slider {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
        }

        .slider img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .slider div {
            min-width: 300px;
            text-align: center;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 16px;
        }

        .animals {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 40px;
        }

        .animal-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .animal-card:hover {
            transform: translateY(-8px);
        }

        .animal-card img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 10px;
        }

        .search-box {
            text-align: right;
            margin: 20px;
        }

        .search-box input {
            padding: 12px 20px;
            width: 400px;
            border-radius: 25px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .search-box button {
            padding: 12px 25px;
            border: none;
            background-color: #6bbf59;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .search-box button:hover {
            background-color: #4cae4c;
        }
    </style>

</head>

<body>

</body>

</html>
